name: "IAC with Terraform"
on:
  push:
    branches: 
      - stage
      - main
    paths: 
      - 'terraform/**'
  pull_request:
    branches: 
      - main
    paths: 
      - 'terraform/**'

env:
  AWS_IAM_ROLE: ${{ secrets.AWS_IAM_ROLE }}
  BUCKET_TF_STATE: ${{ secrets.BUCKET_TF_STATE }}
  AWS_REGION: us-east-1
  EKS_CLUSTER: gitops-eks-cluster

permissions:
  id-token: write
jobs:
  terraform-plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ./terraform
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.6.3

      - name: Terraform Init
        id: init
        run: terraform init -input=false -backend-config="bucket=$BUCKET_TF_STATE"

      - name: Terraform Format
        id: fmt
        run: terraform fmt -check -no-color
      
      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false
        continue-on-error: true

      - name: Terraform Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

  terraform-apply:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ./terraform
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.6.3
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ env.AWS_IAM_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
        
      - name: Terraform Init
        id: init
        run: terraform init -input=false -backend-config="bucket=$BUCKET_TF_STATE"

      - name: Terraform Apply
        id: apply
        run: terraform apply -no-color -auto-approve -input=false -parallelism=1

      # - name: Install Nginx Ingress Controller
      #   id: install-nginx
      #   if: steps.verify-cluster.outcome == 'success'
      #   run: kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.15.1/deploy/static/provider/aws/deploy.yaml